name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux on Ubuntu GARM runner
    runs-on: [self-hosted, ubuntu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

      - name: Build Linux amd64
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/linux-amd64
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/linux-amd64/coderenga ./cmd/coderenga
          tar -C dist/linux-amd64 -czf dist/coderenga-linux-amd64.tar.gz coderenga

      - name: Smoke test Linux binary
        shell: bash
        run: |
          set -euo pipefail
          ./dist/linux-amd64/coderenga --help

      - name: Upload Linux asset
        uses: actions/upload-artifact@v4
        with:
          name: coderenga-linux-amd64
          path: dist/coderenga-linux-amd64.tar.gz

  build-windows:
    name: Build Windows on Windows GARM runner
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        shell: pwsh
        run: |
          go test ./...

      - name: Build Windows amd64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows-amd64 | Out-Null
          go build -trimpath -ldflags="-s -w" -o dist\windows-amd64\coderenga.exe ./cmd/coderenga
          Compress-Archive -Path dist\windows-amd64\coderenga.exe -DestinationPath dist\coderenga-windows-amd64.zip -Force

      - name: Smoke test Windows binary
        shell: pwsh
        run: |
          .\dist\windows-amd64\coderenga.exe --help

      - name: Upload Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: coderenga-windows-amd64
          path: dist\coderenga-windows-amd64.zip

  release:
    name: Create GitHub Release
    needs:
      - build-linux
      - build-windows
    runs-on: [self-hosted, ubuntu]

    steps:
      - name: Download Linux asset
        uses: actions/download-artifact@v4
        with:
          name: coderenga-linux-amd64
          path: dist

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: coderenga-windows-amd64
          path: dist

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum coderenga-linux-amd64.tar.gz coderenga-windows-amd64.zip > checksums.txt
          cat checksums.txt

      - name: Show assets
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/coderenga-linux-amd64.tar.gz
            dist/coderenga-windows-amd64.zip
            dist/checksums.txt
          generate_release_notes: true