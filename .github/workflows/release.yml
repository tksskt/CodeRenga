name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux on Ubuntu GARM runner
    runs-on: [self-hosted, ubuntu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

      - name: Build Linux amd64
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/linux-amd64
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o dist/linux-amd64/coderenga ./cmd/coderenga
          tar -C dist/linux-amd64 -czf dist/coderenga-linux-amd64.tar.gz coderenga

      - name: Smoke test Linux binary
        shell: bash
        run: |
          set -euo pipefail
          ./dist/linux-amd64/coderenga --help

      - name: Upload Linux asset
        uses: actions/upload-artifact@v4
        with:
          name: coderenga-linux-amd64
          path: dist/coderenga-linux-amd64.tar.gz

  build-windows:
    name: Build Windows on Windows GARM runner
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "VERSION=${{ inputs.tag }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "VERSION=$env:GITHUB_REF_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Test
        shell: pwsh
        run: |
          go test ./...

      - name: Build Windows amd64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows-amd64 | Out-Null
          go build -trimpath -ldflags="-s -w -X main.version=$env:VERSION" -o dist\windows-amd64\coderenga.exe ./cmd/coderenga
          Compress-Archive -Path dist\windows-amd64\coderenga.exe -DestinationPath dist\coderenga-windows-amd64.zip -Force

      - name: Smoke test Windows binary
        shell: pwsh
        run: |
          .\dist\windows-amd64\coderenga.exe --help

      - name: Upload Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: coderenga-windows-amd64
          path: dist\coderenga-windows-amd64.zip

  release:
    name: Create GitHub Release
    needs:
      - build-linux
      - build-windows
    runs-on: [self-hosted, ubuntu]

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "Release tag: ${RELEASE_TAG}"

      - name: Download Linux asset
        uses: actions/download-artifact@v4
        with:
          name: coderenga-linux-amd64
          path: dist

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: coderenga-windows-amd64
          path: dist

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum coderenga-linux-amd64.tar.gz coderenga-windows-amd64.zip > checksums.txt
          cat checksums.txt

      - name: Show assets
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: CodeRenga ${{ env.RELEASE_TAG }}
          files: |
            dist/coderenga-linux-amd64.tar.gz
            dist/coderenga-windows-amd64.zip
            dist/checksums.txt
          generate_release_notes: true
          overwrite_files: true